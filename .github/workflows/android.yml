name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew || true
    
    - name: Generate Wrapper if missing
      run: gradle wrapper || true

    - name: Generate Keystore for Release
      run: keytool -genkeypair -alias upload -keyalg RSA -keysize 2048 -validity 10000 -keystore ${{ github.workspace }}/my-upload-key.jks -dname "CN=Qboard, OU=App, O=Org, L=City, ST=State, C=US" -storepass password -keypass password

    - name: Build with Gradle
      run: ./gradlew assembleRelease --no-daemon
      env:
        KEYSTORE_PATH: ${{ github.workspace }}/my-upload-key.jks
        STORE_PASSWORD: password
        KEY_PASSWORD: password

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Qboard-release
        path: app/build/outputs/apk/release/*.apk
